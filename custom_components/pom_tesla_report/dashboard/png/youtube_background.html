<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>POM Tesla YouTube Background</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    #playerWrap, iframe {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
      background: #000;
    }
    iframe {
      width: 120vw;
      height: 120vh;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .msg {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: rgba(255,255,255,.82);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
      background: radial-gradient(circle at center, rgba(30,41,59,.8), #000 70%);
    }
    .msg b { color: #38bdf8; }
  </style>
</head>
<body>
  <div id="playerWrap"></div>
  <script>
    const params = new URLSearchParams(location.search);
    const rawVideo = String(params.get("video") || "").trim();
    const video = rawVideo.match(/^[A-Za-z0-9_-]{6,64}$/) ? rawVideo : "";
    const start = Math.max(0, parseInt(params.get("start") || "0", 10) || 0);
    const mute = params.get("mute") !== "0";
    const loop = params.get("loop") !== "0";

    function showMessage(text) {
      document.getElementById("playerWrap").innerHTML =
        `<div class="msg"><div><b>POM Tesla Background</b><br>${text}</div></div>`;
    }

    if (!video) {
      showMessage("YouTube video ID missing or invalid.");
    } else {
      const origin = encodeURIComponent(location.origin);
      const qs = new URLSearchParams({
        autoplay: "1",
        controls: "0",
        disablekb: "1",
        fs: "0",
        iv_load_policy: "3",
        modestbranding: "1",
        playsinline: "1",
        rel: "0",
        start: String(start),
        mute: mute ? "1" : "0",
        enablejsapi: "1",
        origin: location.origin
      });
      if (loop) {
        qs.set("loop", "1");
        qs.set("playlist", video);
      }

      const iframe = document.createElement("iframe");
      iframe.src = `https://www.youtube-nocookie.com/embed/${video}?${qs.toString()}`;
      iframe.allow = "autoplay; encrypted-media; picture-in-picture; fullscreen";
      iframe.referrerPolicy = "origin-when-cross-origin";
      iframe.title = "POM Tesla YouTube Background";
      iframe.loading = "eager";
      document.getElementById("playerWrap").appendChild(iframe);
    }
  </script>
</body>
</html>
