                          position: relative !important;
                          z-index: 0 !important;
                          height: 100%;
                          {% if is_state('input_boolean.tesla_interactive_map', 'on') %}
                            pointer-events: none !important;
                          {% else %}
                            pointer-events: auto !important;
                          {% endif %}

                          --state-person-home: var(--green-color);
                          --state-person-not-home: var(--red-color);
                          --state-person-zone: var(--blue-color);
                          --state-person-unknown: var(--grey-color);

                          --state-person:
                          {% if is_state(config.entities[0].entity, 'home') %}
                            var(--state-person-home)
                          {% elif is_state(config.entities[0].entity, 'not_home') %}
                            var(--state-person-not-home)
                          {% elif is_state(config.entities[0].entity, 'unknown') %}
                            var(--state-person-unknown)
                          {% else %}
                            var(--state-person-zone)
                          {% endif %};
                        }

                        ha-card {
                          {% if is_state('input_boolean.tesla_interactive_map', 'on') %}
                            pointer-events: none !important;
                            opacity: 0.48 !important;
                            filter: saturate(0.88) brightness(0.90) !important;
                          {% else %}
                            pointer-events: auto !important;
                            opacity: 1 !important;
                            filter: none !important;
                          {% endif %}
                          position: relative !important;
                          width: 100% !important;
                          height: 100% !important;
                          min-height: 100vh !important;
                          margin: 0 !important;
                          padding: 0 !important;
                          border: 0 !important;
                          border-radius: 0 !important;
                          box-shadow: none !important;
                          background: transparent !important;
                          overflow: hidden !important;
                        }

                        ha-map {
                          {% if is_state('input_boolean.tesla_interactive_map', 'on') %}
                            pointer-events: none !important;
                          {% else %}
                            pointer-events: auto !important;
                          {% endif %}
                          display: block !important;
                          width: 100% !important;
                          height: 100% !important;
                          min-height: 100vh !important;
                          border-radius: 0 !important;
                          overflow: hidden !important;
                        }
    - type: conditional
      conditions:
        - entity: input_boolean.tesla_controls
          state: "off"
      card:
        type: custom:mod-card
        card_mod:
          style: |
            :host {
              /*
                Varsayılan / PC ayarı
                Ölçülen Tesla değerleri:
                - Park / tam ekran: 1920 x 1079
                - Sürüşte küçük ekran: 1180 x 919
              */

              --trip-card-max-width: 1120px;
              --trip-card-gap: 96px;
              --trip-card-bottom: 118px;
              --trip-card-scale: 1;

              position: fixed !important;
              left: 50% !important;
              bottom: var(--trip-card-bottom) !important;
              transform: translateX(-50%) !important;

              width: min(var(--trip-card-max-width), calc(100vw - var(--trip-card-gap))) !important;
              max-width: var(--trip-card-max-width) !important;

              margin: 0 !important;
              z-index: 18 !important;
              pointer-events: auto !important;
              display: block !important;
            }

            ha-card {
              width: 100% !important;
              max-width: 100% !important;

              background: transparent !important;
              box-shadow: none !important;
              border: 0 !important;
              padding: 0 !important;
              margin: 0 auto !important;
              overflow: visible !important;

              transform-origin: bottom center !important;
              transform: scale(var(--trip-card-scale)) !important;
            }

            /*
              Tesla park halinde / büyük browser ekranı
              Ölçüm: 1920 x 1079
            */
            @media (min-width: 1600px) and (min-height: 950px) {
              :host {
                --trip-card-max-width: 1120px;
                --trip-card-gap: 180px;
                --trip-card-bottom: 112px;
                --trip-card-scale: 1.05;
              }
            }

            /*
              Tesla sürüş ekranı / browser küçülmüş hali
              Ölçüm: 1180 x 919
              Kritik bölüm burası.
            */
            @media (max-width: 1300px) and (min-height: 800px) {
              :host {
                --trip-card-max-width: 1040px;
                --trip-card-gap: 72px;
                --trip-card-bottom: 82px;
                --trip-card-scale: 0.92;
              }
            }

            /*
              Daha basık yatay tablet / düşük yükseklikli ekranlar
            */
            @media (max-width: 1300px) and (max-height: 800px) {
              :host {
                --trip-card-max-width: 980px;
                --trip-card-gap: 64px;
                --trip-card-bottom: 78px;
                --trip-card-scale: 0.76;
              }
            }

            /*
              Telefon / çok dar ekran
            */
            @media (max-width: 800px) {
              :host {
                --trip-card-max-width: 100vw;
                --trip-card-gap: 32px;
                --trip-card-bottom: 88px;
                --trip-card-scale: 0.72;
              }
            }
        card:
          type: custom:pom-tesla-trip-report-card
          live_trip_entity: sensor.pom_live_trip
