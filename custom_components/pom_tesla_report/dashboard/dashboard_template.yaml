type: custom:mod-card
card_mod:
  style: |
    ha-card {
      background-image: url(
        {% set charge_state = states('binary_sensor.pom_charging') | lower | trim %}
        {% set charger_power = states('sensor.pom_charger_power') | float(0) %}
        {% set shift_state = states('sensor.tesla_shift_state_memory') | lower | trim %}
        {% set speed_value = states('sensor.tesla_speed') | float(0) %}
        {% set is_charging = charger_power > 0.1 or charge_state in ['on', 'true', 'charging', 'charging_ac', 'charging_dc', 'supercharging', 'fast_charging'] %}
        {% set is_drive_gear = shift_state in ['d', 'drive', 'driving', 'r', 'reverse'] %}
        {% set is_park_gear = shift_state in ['p', 'park', 'parked', 'parking'] %}
        {% if is_charging %}
          '/local/png/tesla/teslacharging.gif'
        {% elif is_drive_gear %}
          '/local/png/tesla/tesladriving.gif'
        {% elif is_park_gear or speed_value <= 0 %}
          '/local/png/tesla.png'
        {% else %}
          '/local/png/tesla.png'
        {% endif %}
      );
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      transform: scale(1.00);
      position: relative;
      overflow: hidden !important;
      border-radius: 0 !important;
      border: 0 !important;
      box-shadow: none !important;
      width: 100vw !important;
      height: 100vh !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    ha-card::before {
      content: "";
      position: absolute;
      inset: -5%;
      z-index: 0;
    }

    ha-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1;
    }

    ha-card > * {
      position: relative;
      z-index: 2;
    }
card:
  type: vertical-stack
  cards:
    # POM_DASHBOARD_APP_SWITCHER Tesla -> Drive
    - type: custom:button-card
      show_icon: false
      show_name: false
      show_state: false
      tap_action:
        action: none
      styles:
        card:
          - display: none
          - width: 0
          - height: 0
          - padding: 0
          - margin: 0
          - overflow: hidden
      custom_fields:
        controller: |
          [[[
            const cfg = { active: 'TESLA', target: '/pom-drive-dashboard/drive' };
            window.__pomTeslaAppSwitcherConfig = cfg;

            const hideDriveTopChrome = () => {
              try {
                const path = window.location.pathname || '';
                const onDrive = path.endsWith('/pom-drive-dashboard/drive') || path === '/pom-drive-dashboard/drive';
                const fullscreenWanted = window.localStorage.getItem('pomTeslaDashboardFullscreen') === 'on';
                if (!onDrive || !fullscreenWanted) return;
                const roots = [];
                const seen = new Set();
                const collect = (root, depth = 0) => {
                  if (!root || depth > 7 || seen.has(root)) return;
                  seen.add(root); roots.push(root);
                  let nodes = [];
                  try { nodes = root.querySelectorAll ? root.querySelectorAll('*') : []; } catch(e) { nodes = []; }
                  nodes.forEach((node) => { if (node.shadowRoot) collect(node.shadowRoot, depth + 1); });
                };
                collect(document, 0);
                const vw = Math.max(document.documentElement?.clientWidth || 0, window.innerWidth || 0);
                const isSwitcher = (el) => Boolean(el && (el.id === 'pom-tesla-app-switcher' || el.closest?.('#pom-tesla-app-switcher')));
                const hide = (el) => {
                  if (!el || isSwitcher(el)) return;
                  try {
                    el.style.setProperty('display', 'none', 'important');
                    el.style.setProperty('visibility', 'hidden', 'important');
                    el.style.setProperty('pointer-events', 'none', 'important');
                  } catch(e) {}
                };
                const isTopRight = (el) => {
                  try {
                    if (!el || isSwitcher(el)) return false;
                    const r = el.getBoundingClientRect();
                    return r && r.width > 0 && r.height > 0 && r.top <= 112 && r.bottom <= 156 && r.right >= (vw - 360) && r.width <= 360 && r.height <= 96;
                  } catch(e) { return false; }
                };
                const looksChrome = (el) => {
                  const tag = String(el.localName || el.tagName || '').toLowerCase();
                  const txt = String(el.textContent || '').trim().toLowerCase();
                  return tag.includes('icon-button') || tag.includes('ha-button') || tag.includes('mwc-button') || tag.includes('paper-icon') || tag === 'ha-assist-chip' || txt.includes('updated just now') || txt.includes('update now') || txt.includes('just now') || txt === 'refresh' || txt === 'update';
                };
                roots.forEach((root) => {
                  ['app-header','app-toolbar','ha-top-app-bar-fixed','ha-top-app-bar','ha-header-bar','.toolbar[slot="toolbar"]','[slot="toolbar"]','.top-app-bar'].forEach((sel) => { try { root.querySelectorAll(sel).forEach(hide); } catch(e) {} });
                  try { root.querySelectorAll('*').forEach((el) => { if (isTopRight(el) && looksChrome(el)) hide(el); }); } catch(e) {}
                });
              } catch(e) {}
            };
            const dashPaths = ['/tesla-dashboard/tesla', '/pom-drive-dashboard/drive'];
            const makeSwitcher = () => {
              const path = window.location.pathname || '';
              const onDashboard = dashPaths.some((p) => path.endsWith(p) || path === p);
              let el = document.getElementById('pom-tesla-app-switcher');
              if (!onDashboard) { if (el) el.remove(); return; }
              if (!el) {
                el = document.createElement('button');
                el.id = 'pom-tesla-app-switcher';
                el.type = 'button';
                el.setAttribute('aria-label', 'Switch Tesla / Drive dashboard');
                document.body.appendChild(el);
              }
              const cfgNow = window.__pomTeslaAppSwitcherConfig || cfg;
              const active = cfgNow.active === 'DRIVE' ? 'DRIVE' : 'TESLA';
              el.innerHTML = `<span class="${active === 'TESLA' ? 'active' : ''}">TESLA</span><span class="${active === 'DRIVE' ? 'active' : ''}">DRIVE</span>`;
              el.style.cssText = [
                'position:fixed!important','top:14px!important','right:18px!important',
                'width:176px!important','height:40px!important','z-index:2147483000!important',
                'display:grid!important','grid-template-columns:1fr 1fr!important','align-items:center!important',
                'gap:3px!important','padding:4px!important','box-sizing:border-box!important',
                'border-radius:999px!important','border:1px solid rgba(255,255,255,.22)!important',
                'background:rgba(5,10,18,.70)!important','box-shadow:0 10px 30px rgba(0,0,0,.42)!important',
                'backdrop-filter:blur(12px) saturate(150%)!important','-webkit-backdrop-filter:blur(12px) saturate(150%)!important',
                'font-family:Inter,Roboto,Arial,sans-serif!important','font-size:11px!important','font-weight:900!important',
                'letter-spacing:.6px!important','line-height:1!important','color:rgba(255,255,255,.72)!important',
                'cursor:pointer!important','pointer-events:auto!important','overflow:hidden!important'
              ].join(';') + ';';
              Array.from(el.children).forEach((child) => {
                child.style.cssText = 'height:100%!important;display:flex!important;align-items:center!important;justify-content:center!important;border-radius:999px!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:clip!important;min-width:0!important;';
                if (child.classList.contains('active')) {
                  child.style.cssText += 'color:#06101f!important;background:linear-gradient(135deg,#79bdff,#2f8cff)!important;box-shadow:0 0 18px rgba(47,140,255,.48)!important;';
                }
              });
              el.onclick = (ev) => {
                ev.preventDefault(); ev.stopPropagation();
                const cfgNow = window.__pomTeslaAppSwitcherConfig || cfg;
                const target = cfgNow.target;
                try {
                  window.history.pushState(null, '', target);
                  window.dispatchEvent(new CustomEvent('location-changed', { detail: { replace: true } }));
                  setTimeout(() => { if ((window.location.pathname || '') !== target) window.location.assign(target); }, 250);
                } catch(e) { window.location.assign(target); }
              };
            };
            makeSwitcher();
            hideDriveTopChrome();
            if (!window.__pomTeslaAppSwitcherTimer) {
              window.__pomTeslaAppSwitcherTimer = window.setInterval(() => {
                try {
                  makeSwitcher();
                } catch(e) {}
              }, 1200);
            }
            return '';
          ]]]

    # POM_YOUTUBE_DRIVING_BACKGROUND
    - type: horizontal-stack
      cards:
        - type: custom:mod-card
          card_mod:
            style: |
              ha-card {
                background: transparent !important;
                box-shadow: none !important;
                border: none !important;
                padding: 0 !important;
                margin: 0 auto !important;
                z-index: 2 !important;
                position: relative !important;
                width: fit-content !important;
                max-width: 100% !important;
              }

              :host {
                margin-top: 80px !important;
                display: flex !important;
                justify-content: center !important;
                align-items: center !important;
                width: fit-content !important;
                max-width: fit-content !important;
                margin-left: auto !important;
                margin-right: auto !important;
                position: relative !important;
                z-index: 2 !important;
              }
              @media (min-width: 1400px) {
                ha-card {
                  transform: translateY(20%) scale(2.10) !important;
                  transform-origin: center center !important;
                }
              }
              @media (max-width: 1399px) {
                ha-card {
                  transform: translateY(10%) scale(1.25) !important;
                  transform-origin: left center !important;
                }
              }
          card:
            type: horizontal-stack
            cards:
              # POM_BLOCK_START top_left
              - type: custom:button-card
                entity: sensor.tesla_power
                show_icon: false
                show_name: false
                show_state: false
                tap_action:
                  action: none
                custom_fields:
                  info: |
                    [[[
                      const energy = Number(states['sensor.tesla_elevation']?.state);
                      const elevation = Number(states['sensor.tesla_power']?.state);

                      const energyText = isNaN(energy) ? '-' : `${energy.toFixed(1)} M`;
                      const elevationText = isNaN(elevation) ? '-' : `${elevation.toFixed(1)}kW`;

                      return `
                        <div class="left-wrap">
                          <div class="label">EĞİM</div>
                          <div class="value">${energyText}</div>

                          <div class="label second">POWER</div>
                          <div class="value small">${elevationText}</div>
                        </div>
                      `;
                    ]]]
                styles:
                  card:
                    - height: 230px
                    - width: 250px
                    - background: transparent
                    - box-shadow: none
                    - border: 0
                    - padding: 0
                  grid:
                    - grid-template-areas: "\"info\""
                    - grid-template-columns: 1fr
                    - grid-template-rows: 1fr
                  custom_fields:
                    info:
                      - align-self: center
                      - justify-self: end
                      - text-align: right
                      - padding-right: 22px
                card_mod:
                  style: |
                    .left-wrap {
                      line-height: 1.05;
                      font-family: inherit;
                    }

                    .label {
                      color: rgba(255,255,255,0.28);
                      font-size: 17px;
                      font-weight: 500;
                      letter-spacing: 1.2px;
                    }

                    .label.second {
                      margin-top: 14px;
                    }

                    .value {
                      color: rgba(255,255,255,0.78);
                      font-size: 26px;
                      font-weight: 800;
                      letter-spacing: -0.5px;
                    }

                    .value.small {
                      font-size: 26px;
                    }
              # POM_BLOCK_END top_left
              # POM_BLOCK_START top_center
              - type: custom:button-card
                entity: sensor.tesla_speed
                tap_action:
                  action: call-service
                  service: input_boolean.toggle
                  target:
                    entity_id: input_boolean.tesla_map
                show_name: false
                show_icon: false
                show_state: false
                styles:
                  card:
                    - width: 180px
                    - height: 180px
                    - border-radius: 50%
                    - padding: 0
                    - border: none
                    - background: |
                        [[[
                          const v = Number(entity?.state) || 0;
                          const pct = Math.min(v / 180, 1);
                          const deg = pct * 360;
                          const color = v < 50 ? '#60a5fa' : v < 100 ? '#fbbf24' : '#f87171';
                          return `conic-gradient(
                            ${color} ${deg}deg,
                            rgba(255,255,255,0.06) ${deg}deg
                          )`;
                        ]]]
                    - box-shadow: |
                        [[[ 
                          const v = Number(entity?.state) || 0;
                          const glow = v < 50
                            ? '0 0 25px rgba(96,165,250,0.35)'
                            : v < 100
                            ? '0 0 25px rgba(251,191,36,0.35)'
                            : '0 0 25px rgba(248,113,113,0.35)';
                          return glow;
                        ]]]
                  custom_fields:
                    inner:
                      - position: absolute
                      - inset: 18px
                      - border-radius: 50%
                      - background: rgba(8,8,8,0.88)
                      - border: 1px solid rgba(255,255,255,0.06)
                      - display: flex
                      - align-items: center
                      - justify-content: center
                      - flex-direction: column
                custom_fields:
                  inner: |
                    [[[
                      const v = Math.round(Number(entity?.state) || 0);
                      return `
                        <div style="font-size:62px;font-weight:700;line-height:1;color:white;">${v}</div>
                        <div style="font-size:13px;opacity:0.65;color:white;letter-spacing:1.5px;">SPEED</div>
                      `;
                    ]]]
                card_mod:
                  style: |
                    ha-card {
                      z-index: 2 !important;  
                      
                    }
                    :host {
                      margin-top: 20px !important;  
              # POM_BLOCK_END top_center
              # POM_BLOCK_START top_right
              - type: custom:button-card
                entity: sensor.tesla_battery_level
                show_icon: false
                show_name: false
                show_state: false
                tap_action:
                  action: call-service
                  service: input_boolean.toggle
                  target:
                    entity_id: input_boolean.tablet_kapi_ana_sayfa_secret_menu
                custom_fields:
                  info: |
                    [[[
                      const battery = Number(states['sensor.tesla_battery_level']?.state);
                      const range = Number(states['sensor.tesla_est_range']?.state);

                      const batteryText = isNaN(battery) ? '-' : `${Math.round(battery)}%`;
                      const rangeText = isNaN(range) ? '-' : `${range.toFixed(1)} km`;

                      return `
                        <div class="right-wrap">
                          <div class="label">BATARYA</div>
                          <div class="battery">${batteryText}</div>
                          <div class="range">${rangeText}</div>
                        </div>
                      `;
                    ]]]
                styles:
                  card:
                    - height: 230px
                    - width: 260px
                    - background: transparent
                    - box-shadow: none
                    - border: 0
                    - padding: 0
                  grid:
                    - grid-template-areas: "\"info\""
                    - grid-template-columns: 1fr
                    - grid-template-rows: 1fr
                  custom_fields:
                    info:
                      - align-self: center
                      - justify-self: start
                      - text-align: left
                      - padding-left: 28px
                card_mod:
                  style: |
                    .right-wrap {
                      line-height: 1.05;
                      font-family: inherit;
                    }

                    .label {
                      color: rgba(255,255,255,0.28);
                      font-size: 17px;
                      font-weight: 500;
                      letter-spacing: 1.2px;
                    }

                    .battery {
                      color: white;
                      font-size: 52px;
                      font-weight: 900;
                      letter-spacing: -1.8px;
                      line-height: 0.95;
                    }

                    .range {
                      color: #18af85;
                      font-size: 20px;
                      font-weight: 500;
                      margin-top: 8px;
                    }
              # POM_BLOCK_END top_right
