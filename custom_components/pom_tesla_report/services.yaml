debug_config:
  name: Debug config
  description: Seçilen POM Tesla Report entity ve fiyat ayarlarını Home Assistant bildirimi olarak gösterir.

send_charge_report:
  name: Send charge report
  description: Şarj seansı için koyu tasarımlı PNG raporu üretir ve isteğe bağlı Telegram'a fotoğraf olarak gönderir. Grafik için sensor.pom_charger_power örnekleri kullanılır.
  fields:
    test_mode:
      name: Test modu
      description: Açık olursa gerçek şarj örneği yokken örnek bir charge curve ile test görseli üretir.
      required: false
      default: false
      selector:
        boolean:

    send_telegram:
      name: Telegram'a gönder
      description: Açık olursa PNG raporu Telegram'a fotoğraf olarak gönderir.
      required: false
      default: true
      selector:
        boolean:

    chat_id:
      name: Chat ID
      description: Önerilen alan. Grup veya kullanıcı chat ID değerini buraya yaz.
      required: false
      selector:
        text:

    telegram_target:
      name: Legacy Telegram target
      description: Eski alan. Boş bırakılabilir; mümkünse chat_id kullan.
      required: false
      selector:
        text:

    added_kwh:
      name: Eklenen enerji
      description: Test için manuel kWh değeri. Boş bırakılırsa sensor.pom_charge_energy_added okunur.
      required: false
      selector:
        number:
          min: 0
          max: 200
          step: 0.01
          mode: box
          unit_of_measurement: kWh

    battery_level:
      name: Batarya seviyesi
      description: Geriye dönük uyumluluk için tutuldu; yeni PNG raporunda kullanılmaz.
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.1
          mode: box
          unit_of_measurement: "%"

    duration_minutes:
      name: Şarj süresi
      description: Test için manuel süre. Gerçek kullanımda entegrasyon şarj başlangıç/bitiş süresini kendi toplar.
      required: false
      selector:
        number:
          min: 0
          max: 3000
          step: 1
          mode: box
          unit_of_measurement: dakika

    message_prefix:
      name: Mesaj ön eki
      description: Telegram fotoğraf açıklamasının başına eklenecek isteğe bağlı metin.
      required: false
      selector:
        text:

    actual_provider:
      name: Gerçek sağlayıcı
      description: Test/manuel rapor için gerçek şarj sağlayıcısı. Örn. Diğer, ZES, Supercharger.
      required: false
      selector:
        text:

    actual_price_per_kwh:
      name: Gerçek birim fiyat
      description: Test/manuel rapor için seçili para birimi/kWh değeri.
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.01
          mode: box
          unit_of_measurement: currency/kWh

    actual_total_cost:
      name: Gerçek toplam tutar
      description: Test/manuel rapor için gerçek toplam ödeme. Birim fiyat ile birlikte girilirse eklenen kWh buradan hesaplanır.
      required: false
      selector:
        number:
          min: 0
          max: 10000
          step: 0.01
          mode: box
          unit_of_measurement: currency


start_charge_report_prompt:
  name: Start charge report prompt
  description: Telegram'a butonlu "Nerede şarj ettin?" sorusunu gönderir. Test için gerçek şarj beklemeden interaktif akışı başlatır.
  fields:
    test_mode:
      name: Test modu
      description: Açık olursa gerçek şarj verisi yokken örnek şarj eğrisi ve değerlerle soru akışını başlatır.
      required: false
      default: false
      selector:
        boolean:

    chat_id:
      name: Chat ID
      description: Önerilen alan. Grup veya kullanıcı chat ID değerini buraya yaz.
      required: false
      selector:
        text:

    telegram_target:
      name: Legacy Telegram target
      description: Eski alan. Boş bırakılabilir; mümkünse chat_id kullan.
      required: false
      selector:
        text:

    added_kwh:
      name: Eklenen enerji
      description: Test için bekleyen raporda kullanılacak kWh değeri.
      required: false
      selector:
        number:
          min: 0
          max: 200
          step: 0.01
          mode: box
          unit_of_measurement: kWh

    duration_minutes:
      name: Şarj süresi
      description: Test için bekleyen raporda kullanılacak şarj süresi.
      required: false
      selector:
        number:
          min: 0
          max: 3000
          step: 1
          mode: box
          unit_of_measurement: dakika

    battery_range_km:
      name: Menzil
      description: Test için bekleyen raporda kullanılacak menzil.
      required: false
      selector:
        number:
          min: 0
          max: 1000
          step: 1
          mode: box
          unit_of_measurement: km

    battery_range_estimate_km:
      name: Tahmini menzil
      description: Test için bekleyen raporda kullanılacak tahmini menzil.
      required: false
      selector:
        number:
          min: 0
          max: 1000
          step: 1
          mode: box
          unit_of_measurement: km

    peak_power_kw:
      name: Tepe güç
      description: Test için bekleyen raporda kullanılacak tepe güç.
      required: false
      selector:
        number:
          min: 0
          max: 400
          step: 1
          mode: box
          unit_of_measurement: kW

generate_test_trip_image:
  name: Generate test trip image
  description: Chromium kullanmadan test sürüş raporu PNG dosyası üretir ve isteğe bağlı Telegram'a gönderir.
  fields:
    send_telegram:
      name: Telegram'a gönder
      description: Açık olursa üretilen PNG Telegram'a fotoğraf olarak gönderilir.
      required: false
      default: true
      selector:
        boolean:

    test_mode:
      name: Test modu
      description: Açık olursa rapor başlığı TEST olarak görünür.
      required: false
      default: true
      selector:
        boolean:

    trip_km:
      name: Mesafe
      required: false
      default: 12.4
      selector:
        number:
          min: 0
          max: 2000
          step: 0.01
          mode: box
          unit_of_measurement: km

    duration_text:
      name: Süre metni
      required: false
      default: "28 dakika"
      selector:
        text:

    traffic_text:
      name: Trafik metni
      required: false
      default: "9 dakika"
      selector:
        text:

    average_speed:
      name: Ortalama hız
      required: false
      default: 26.6
      selector:
        number:
          min: 0
          max: 250
          step: 0.1
          mode: box
          unit_of_measurement: km/sa

    used_kwh:
      name: Harcanan enerji
      required: false
      default: 2.35
      selector:
        number:
          min: 0
          max: 300
          step: 0.01
          mode: box
          unit_of_measurement: kWh

    consumption_kwh_100km:
      name: Tüketim
      required: false
      default: 18.95
      selector:
        number:
          min: 0
          max: 100
          step: 0.01
          mode: box
          unit_of_measurement: kWh/100 km

    start_battery:
      name: Başlangıç batarya
      required: false
      default: 82
      selector:
        number:
          min: 0
          max: 100
          step: 0.1
          mode: box
          unit_of_measurement: "%"

    end_battery:
      name: Bitiş batarya
      required: false
      default: 78
      selector:
        number:
          min: 0
          max: 100
          step: 0.1
          mode: box
          unit_of_measurement: "%"

    climate_text:
      name: Klima metni
      required: false
      default: "Klima yolculuk boyunca 18 dakika açıktı."
      selector:
        text:

    min_elevation:
      name: En düşük rakım
      required: false
      default: 24
      selector:
        number:
          min: -500
          max: 5000
          step: 1
          mode: box
          unit_of_measurement: m

    max_elevation:
      name: En yüksek rakım
      required: false
      default: 74
      selector:
        number:
          min: -500
          max: 5000
          step: 1
          mode: box
          unit_of_measurement: m

    elevation_range:
      name: Rakım farkı
      required: false
      default: 50
      selector:
        number:
          min: 0
          max: 5000
          step: 1
          mode: box
          unit_of_measurement: m

    efficiency_comment:
      name: Verimlilik yorumu
      required: false
      default: "Bu PNG Chromium olmadan doğrudan entegrasyon içinde oluşturuldu."
      selector:
        text:

generate_trip_image_from_json:
  name: Generate trip image from JSON
  description: Mevcut tesla_trip_data.json dosyasını okuyup Chromium kullanmadan PNG sürüş raporu üretir.
  fields:
    json_path:
      name: JSON dosya yolu
      description: Okunacak final sürüş JSON dosyası.
      required: false
      default: /config/www/tesla_trip_report/tesla_trip_data.json
      selector:
        text:

    output_path:
      name: PNG çıktı yolu
      description: Oluşturulacak PNG dosyasının yolu.
      required: false
      default: /config/www/pom_tesla_report/final_trip_report.png
      selector:
        text:

    send_telegram:
      name: Telegram'a gönder
      description: Açık olursa oluşturulan PNG Telegram'a fotoğraf olarak gönderilir.
      required: false
      default: true
      selector:
        boolean:

    caption:
      name: Telegram açıklaması
      description: Telegram fotoğraf açıklaması.
      required: false
      default: "🚗 POM Tesla Report - Sürüş Görseli"
      selector:
        text:

start_trip:
  name: Start trip
  description: POM Tesla Report entegrasyonu içinde manuel sürüş takibini başlatır.
  fields:
    force:
      name: Zorla başlat
      description: Aktif bir sürüş varsa üzerine yazarak yeniden başlatır.
      required: false
      default: false
      selector:
        boolean:

    send_notification:
      name: Bildirim oluştur
      description: Başlangıç değerlerini Home Assistant bildirimi olarak gösterir.
      required: false
      default: true
      selector:
        boolean:

finish_trip:
  name: Finish trip
  description: POM Tesla Report manuel sürüş takibini bitirir, PNG üretir ve isteğe bağlı Telegram'a gönderir.
  fields:
    send_telegram:
      name: Telegram'a gönder
      description: Açık olursa oluşturulan PNG Telegram'a fotoğraf olarak gönderilir.
      required: false
      default: true
      selector:
        boolean:

    caption:
      name: Telegram açıklaması
      description: Telegram fotoğraf açıklaması.
      required: false
      default: "🚗 POM Tesla Report - Manuel Sürüş Raporu"
      selector:
        text:

    output_path:
      name: PNG çıktı yolu
      description: Oluşturulacak manuel sürüş raporu PNG dosyasının yolu.
      required: false
      default: /config/www/pom_tesla_report/manual_trip_report.png
      selector:
        text:

    test_mode:
      name: Test modu
      description: Açık olursa rapor başlığı TEST olarak görünür.
      required: false
      default: false
      selector:
        boolean:

    override_trip_km:
      name: Test mesafesi
      description: Boş bırakılırsa odometer farkından hesaplanır.
      required: false
      selector:
        number:
          min: 0
          max: 2000
          step: 0.01
          mode: box
          unit_of_measurement: km

    override_used_kwh:
      name: Test harcanan enerji
      description: Boş bırakılırsa kalan kWh farkından hesaplanır.
      required: false
      selector:
        number:
          min: 0
          max: 300
          step: 0.01
          mode: box
          unit_of_measurement: kWh

    override_end_battery:
      name: Test bitiş bataryası
      description: Boş bırakılırsa seçili batarya entity'sinden okunur.
      required: false
      selector:
        number:
          min: 0
          max: 100
          step: 0.1
          mode: box
          unit_of_measurement: "%"

    override_duration_minutes:
      name: Test sürüş süresi
      description: Boş bırakılırsa start_trip ile finish_trip arasındaki gerçek süre kullanılır.
      required: false
      selector:
        number:
          min: 0
          max: 3000
          step: 1
          mode: box
          unit_of_measurement: dakika

    override_traffic_minutes:
      name: Test trafik süresi
      description: Şimdilik manuel test için kullanılır. Otomatik trafik takibi sonraki aşamada eklenecek.
      required: false
      selector:
        number:
          min: 0
          max: 3000
          step: 1
          mode: box
          unit_of_measurement: dakika

debug_trip_state:
  name: Debug trip state
  description: POM Tesla Report içindeki manuel sürüş state'ini bildirim olarak gösterir.

reset_trip:
  name: Reset trip
  description: POM Tesla Report içindeki manuel sürüş state'ini sıfırlar.


