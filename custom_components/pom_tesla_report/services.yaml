      name: Legacy Telegram target
      description: Eski alan. Boş bırakılabilir; mümkünse chat_id kullan.
      required: false
      selector:
        text:

start_live_trip_test:
  name: Start live trip test
  description: Gerçek araç hareketi olmadan sensor.pom_live_trip üzerinde canlı sürüş simülasyonu başlatır.
  fields:
    duration_minutes:
      name: Sürüş süresi
      description: Simüle edilecek toplam sürüş süresi.
      required: false
      default: 18
      selector:
        number:
          min: 0.1
          max: 300
          step: 0.1
          mode: box
          unit_of_measurement: dakika
    distance_km:
      name: Mesafe
      description: Simüle edilecek toplam mesafe.
      required: false
      default: 3.39
      selector:
        number:
          min: 0
          max: 2000
          step: 0.01
          mode: box
          unit_of_measurement: km
    used_kwh:
      name: Kullanılan enerji
      description: Simüle edilecek toplam enerji tüketimi.
      required: false
      default: 0.62
      selector:
        number:
          min: 0
          max: 300
          step: 0.01
          mode: box
          unit_of_measurement: kWh
    start_battery:
      name: Başlangıç batarya
      required: false
      default: 54
      selector:
        number:
          min: 0
          max: 100
          step: 0.1
          mode: box
          unit_of_measurement: "%"
    end_battery:
      name: Bitiş batarya
      required: false
      default: 53
      selector:
        number:
          min: 0
          max: 100
          step: 0.1
          mode: box
          unit_of_measurement: "%"
    min_elevation:
      name: Minimum rakım
      required: false
      default: 26
      selector:
        number:
          min: -500
          max: 5000
          step: 1
          mode: box
          unit_of_measurement: m
    max_elevation:
      name: Maksimum rakım
      required: false
      default: 49
      selector:
        number:
          min: -500
          max: 5000
          step: 1
          mode: box
          unit_of_measurement: m
    traffic_minutes:
      name: Trafik süresi
      description: Hız eşiğinin altında geçmiş gibi gösterilecek süre.
      required: false
      default: 18
      selector:
        number:
          min: 0
          max: 300
          step: 0.1
          mode: box
          unit_of_measurement: dakika
    climate_minutes:
      name: Klima süresi
      required: false
      default: 18
      selector:
        number:
          min: 0
          max: 300
          step: 0.1
          mode: box
          unit_of_measurement: dakika
    speed_multiplier:
      name: Simülasyon hızı
      description: 12 değeri, 18 dakikalık sürüşü yaklaşık 90 saniyede oynatır.
      required: false
      default: 12
      selector:
        number:
          min: 0.1
          max: 120
          step: 0.1
          mode: box
    update_interval_seconds:
      name: Güncelleme aralığı
      description: Test sırasında sensor.pom_live_trip kaç saniyede bir güncellensin.
      required: false
      default: 1
      selector:
        number:
          min: 0.5
          max: 10
          step: 0.5
          mode: box
          unit_of_measurement: saniye

finish_live_trip_test:
  name: Finish live trip test
  description: Devam eden canlı sürüş testini hemen final moda alır.

reset_live_trip_test:
  name: Reset live trip test
  description: Canlı sürüş test verisini temizler ve sensor.pom_live_trip durumunu idle yapar.

rebuild_dashboard:
  name: Rebuild Tesla dashboard
  description: POM Tesla Report içindeki dashboard modülünü kullanarak Tesla dashboard YAML dosyasını yeniden üretir.

show_dashboard_dependencies:
  name: Show dashboard dependencies
  description: Tesla dashboard için gerekli custom Lovelace kartlarının durumunu persistent notification olarak gösterir.

install_dashboard_resources:
  name: Install / repair dashboard resources
  description: POM Tesla Report ile gelen Lovelace kart resource kayıtlarını otomatik ekler veya günceller.

set_dashboard_energy_field:
  name: Set dashboard energy field
  description: Selects what the experimental dashboard energy field displays and closes its popup.
  fields:
    field:
      name: Field
      description: Dashboard field key to display.
      required: true
      selector:
        select:
          options:
            - energy_remaining
            - battery_level
            - battery_range
            - inside_temp
            - outside_temp
            - odometer
            - battery_heater
            - empty

send_dashboard_person_track_telegram:
  name: Send dashboard person-track location to Telegram
  description: Sends the selected dashboard Person Track slot address and Google Maps link to the configured Telegram target.
  fields:
    slot:
      name: Slot
      description: Person Track slot number, 1 to 3.
      required: false
      example: 1
      selector:
        number:
          min: 1
          max: 3
          step: 1
          mode: box
    telegram_target:
      name: Telegram target
      description: Optional Telegram chat/group ID override. If empty, integration Telegram settings are used.
      required: false
      example: "-1001234567890"
      selector:
        text:
    chat_id:
      name: Chat ID
      description: Optional alias for Telegram target.
      required: false
      selector:
        text:
