<svg width="100%" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Tesla logosu</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Tesla'nın kırmızı T logosu ve altında TESLA yazısı</desc>

  

  <g transform="translate(340, 80)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <!-- Tesla T logo shape -->
    <!-- Top horizontal bar -->
    <path d="&#10;      M -90, 0&#10;      C -90,-22 -60,-30 -40,-30&#10;      L -40,-12&#10;      C -55,-12 -65,-6 -65, 0&#10;      L -18, 0&#10;      L 0, 120&#10;      L 18, 0&#10;      L 65, 0&#10;      C 65,-6 55,-12 40,-12&#10;      L 40,-30&#10;      C 60,-30 90,-22 90, 0&#10;      L 28, 0&#10;      L 0, 150&#10;      L -28, 0&#10;      Z&#10;    " style="fill:rgb(232, 33, 39);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Arc over the top -->
    <path fill="none" stroke="#CC0000" stroke-width="0" d="M -90,0 Q 0,-60 90,0" style="fill:rgb(232, 33, 39);stroke:rgb(204, 0, 0);color:rgb(255, 255, 255);stroke-width:0px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <text x="340" y="295" style="fill:rgb(232, 33, 39);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Helvetica Neue&quot;, Helvetica, Arial, sans-serif;font-size:28px;font-weight:300;text-anchor:middle;dominant-baseline:auto">TESLA</text>
</svg>